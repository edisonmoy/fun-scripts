name: Concert ticket price check

on:
  # Scheduled checks are disabled: the only watched event (Noah Kahan at
  # Citi Field, 2026-07-19) has passed, so there is nothing to alert on.
  # Re-enable this cron if a future event is added to WATCHED_EVENTS.
  # schedule:
  #   - cron: "*/15 * * * *"
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

jobs:
  check-prices:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: concert-ticket-alerts
        run: |
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run price check
        working-directory: concert-ticket-alerts
        env:
          SEATGEEK_CLIENT_ID: ${{ secrets.SEATGEEK_CLIENT_ID }}
          ALERT_EMAIL_FROM: ${{ secrets.ALERT_EMAIL_FROM }}
          ALERT_EMAIL_PASSWORD: ${{ secrets.ALERT_EMAIL_PASSWORD }}
          ALERT_EMAIL_TO: ${{ secrets.ALERT_EMAIL_TO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python main.py

      - name: Commit updated price history
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add concert-ticket-alerts/data/
          git diff --cached --quiet || git commit -m "Update price history"
          git push
