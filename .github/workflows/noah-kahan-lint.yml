name: Noah Kahan lint

on:
  push:
    paths:
      - "noah-kahan-alerts/**"
  pull_request:
    paths:
      - "noah-kahan-alerts/**"

jobs:
  ruff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        working-directory: noah-kahan-alerts
        run: ruff check .
